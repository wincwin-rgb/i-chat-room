<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 共享對話室</title>

<!-- ============================================================
     🔥 FIREBASE 設定說明
     
     在下方 firebaseConfig 填入你的 Firebase 專案資料：
     1. 前往 https://console.firebase.google.com
     2. 建立專案 → 新增 Web 應用程式
     3. 複製 firebaseConfig 物件貼到下方
     4. 左側選單 → Build → Realtime Database → 建立資料庫
     5. 規則設定為開放讀寫（測試模式）：
        { "rules": { ".read": true, ".write": true } }
     ============================================================ -->

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');

:root {
  --bg:       #f5f2eb;
  --paper:    #faf8f3;
  --ink:      #1a1a1a;
  --ink2:     #555550;
  --ink3:     #999990;
  --rule:     #e0ddd4;
  --accent:   #c8410a;
  --accent-l: #e8e0d8;
  --ai-bg:    #1a1a1a;
  --ai-ink:   #f0ede6;

  --u0: #c8410a;
  --u1: #2a6e4a;
  --u2: #1a4a8a;
  --u3: #7a3a8a;
  --u4: #8a5a1a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── LOBBY ────────────────────────────────── */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  gap: 40px;
  padding: 24px;
  background: var(--paper);
}

.brand {
  text-align: center;
}
.brand-mark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: clamp(32px, 8vw, 56px);
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -3px;
  line-height: 1;
}
.brand-sub {
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 10px;
}

.lobby-card {
  width: 100%;
  max-width: 400px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 4px;
  font-family: 'IBM Plex Mono', monospace;
}

input[type=text] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 11px 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
input[type=text]:focus { border-color: var(--accent); }
input[type=text]::placeholder { color: var(--ink3); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 2px;
  padding: 12px 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  transition: opacity .15s, transform .1s;
}
.btn-primary:hover { opacity: .9; }
.btn-primary:active { transform: scale(.98); }

.divider-line {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--ink3);
  font-size: 11px;
  letter-spacing: 1px;
}
.divider-line::before, .divider-line::after {
  content:''; flex:1; height:1px; background: var(--rule);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 11px 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  color: var(--ink2);
  cursor: pointer;
  width: 100%;
  transition: background .15s;
}
.btn-secondary:hover { background: var(--accent-l); }

.config-warn {
  background: #fff8f0;
  border: 1px solid #f0c090;
  border-radius: 2px;
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: #7a4010;
  font-family: 'IBM Plex Mono', monospace;
}

/* ── APP SHELL ────────────────────────────── */
#app {
  display: none;
  flex-direction: column;
  height: 100dvh;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}

.header-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  flex-shrink: 0;
}

.room-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 3px 10px;
  color: var(--accent);
  cursor: pointer;
  transition: background .15s;
  flex-shrink: 0;
}
.room-pill:hover { background: var(--accent-l); }

.users-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
  justify-content: flex-end;
}

.user-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--ink2);
  padding: 2px 8px 2px 4px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 20px;
}

.u-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  flex-shrink: 0;
}

/* BODY */
.body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* MESSAGES */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

/* message groups */
.msg-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 12px;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}

.msg-group.mine { align-items: flex-end; }
.msg-group.ai-group { align-items: flex-start; }

.msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  padding: 0 2px;
}
.msg-group.mine .msg-meta { flex-direction: row-reverse; }

.meta-avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  flex-shrink: 0;
}

.meta-name {
  font-size: 11px;
  color: var(--ink3);
  font-family: 'IBM Plex Mono', monospace;
}

.bubble {
  max-width: min(560px, 80vw);
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.65;
  border-radius: 2px;
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink);
  word-break: break-word;
  white-space: pre-wrap;
}

.msg-group.mine .bubble {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  border-radius: 2px 2px 2px 10px;
}

.msg-group.ai-group .bubble {
  background: var(--ai-bg);
  border-color: var(--ai-bg);
  color: var(--ai-ink);
  border-radius: 2px 2px 10px 2px;
  font-family: 'Noto Sans TC', sans-serif;
}

.bubble-time {
  font-size: 10px;
  color: var(--ink3);
  padding: 0 4px;
  font-family: 'IBM Plex Mono', monospace;
}

/* system msg */
.sys {
  text-align: center;
  font-size: 11px;
  color: var(--ink3);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 1px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sys::before,.sys::after { content:''; flex:1; height:1px; background: var(--rule); }

/* typing */
.typing-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--ai-bg);
  color: var(--ai-ink);
  padding: 12px 16px;
  border-radius: 2px 2px 10px 2px;
  display: flex; gap: 5px; align-items: center;
}
.typing-bubble span {
  width: 5px; height: 5px;
  background: #aaa;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: .2s; }
.typing-bubble span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,80%,100% { transform: scale(.6); opacity:.4; }
  40%          { transform: scale(1);  opacity:1; }
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  border-left: 1px solid var(--rule);
  background: var(--paper);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  flex-shrink: 0;
  overflow-y: auto;
}

.sidebar-section h4 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}

.sidebar-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ink2);
  margin-bottom: 6px;
}

.online-ring {
  width: 6px; height: 6px;
  background: #2a9a5a;
  border-radius: 50%;
  flex-shrink: 0;
}

.share-box {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 8px 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  word-break: break-all;
  line-height: 1.5;
  cursor: pointer;
  transition: background .15s;
}
.share-box:hover { background: var(--accent-l); }

.copy-btn {
  width: 100%;
  margin-top: 8px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 7px;
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--ink2);
  cursor: pointer;
  transition: background .15s;
}
.copy-btn:hover { background: var(--accent-l); }

/* INPUT BAR */
.input-bar {
  padding: 14px 18px;
  background: var(--paper);
  border-top: 1px solid var(--rule);
  flex-shrink: 0;
}

.input-inner {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 10px 12px;
  transition: border-color .15s;
}
.input-inner:focus-within { border-color: var(--accent); }

textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  color: var(--ink);
  resize: none;
  max-height: 120px;
  line-height: 1.5;
}
textarea::placeholder { color: var(--ink3); }

.send-btn {
  background: var(--accent);
  border: none;
  border-radius: 2px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity .15s;
}
.send-btn:hover { opacity: .85; }
.send-btn:disabled { opacity: .3; cursor: not-allowed; }
.send-btn svg { width:14px; height:14px; fill: white; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--ink);
  color: var(--paper);
  padding: 9px 18px;
  border-radius: 2px;
  font-size: 13px;
  font-family: 'IBM Plex Mono', monospace;
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
  z-index: 99;
  white-space: nowrap;
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

.share-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.share-bar-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  white-space: nowrap;
}
.share-bar-code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 3px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 5px 12px;
  flex-shrink: 0;
  cursor: pointer;
}
.share-bar-btn {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 8px 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}

@media (max-width: 580px) {
  .sidebar { display: none; }
  .users-row { display: none; }
  .share-bar { display: flex; }
  .room-pill { display: none; }
}
</style>
</head>
<body>

<!-- ══════════════ LOBBY ══════════════ -->
<div id="lobby">
  <div class="brand">
    <div class="brand-mark">chat.ai</div>
    <div class="brand-sub">多人 × AI 共享對話室</div>
  </div>

  <div class="lobby-card">
    <div id="config-status" class="config-warn">
      ⚠ 請先填寫 Firebase 設定<br>
      打開此 HTML 檔，在 &lt;script&gt; 區塊填入你的 firebaseConfig
    </div>

    <div>
      <div class="field-label">你的名稱</div>
      <input type="text" id="name-in" placeholder="輸入名稱（例：小明）" maxlength="16">
    </div>

    <button class="btn-primary" onclick="createRoom()">＋ 建立新對話室</button>
    <div class="divider-line">或加入現有房間</div>

    <div>
      <div class="field-label">房間代碼</div>
      <input type="text" id="room-in" placeholder="貼上 6 碼房間代碼">
    </div>
    <button class="btn-secondary" onclick="joinRoom()">加入對話室 →</button>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="header">
    <div class="header-title">chat.ai</div>
    <div class="room-pill" id="room-badge" onclick="copyRoomId()">------</div>
    <div class="users-row" id="users-row"></div>
  </div>

  <!-- 手機版分享列 -->
  <div class="share-bar" id="share-bar">
    <span class="share-bar-label">房間</span>
    <span class="share-bar-code" id="mobile-room-code" onclick="copyRoomId()">------</span>
    <button class="share-bar-btn" onclick="copyLink()">📋 複製邀請連結</button>
  </div>

  <div class="body">
    <div class="msgs" id="msgs"></div>
    <div class="sidebar">
      <div class="sidebar-section">
        <h4>線上成員</h4>
        <div id="sb-users"></div>
      </div>
      <div class="sidebar-section">
        <h4>邀請連結</h4>
        <div class="share-box" id="share-url" onclick="copyLink()">載入中...</div>
        <button class="copy-btn" onclick="copyLink()">複製連結</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-inner">
      <textarea id="txt" rows="1"
        placeholder="輸入訊息… Enter 發送，Shift+Enter 換行"
        onkeydown="onKey(event)"
        oninput="resize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════ FIREBASE SDK ══════════════ -->
<script type="module">
// ╔══════════════════════════════════════════════════════╗
// ║  在這裡貼入你的 Firebase 設定                         ║
// ║  前往 Firebase Console → 專案設定 → 你的應用程式      ║
// ╚══════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey:            "AIzaSyAP1Xp6M7dnNzbL2kOLhQfdDqtDA6Zoci8",
  authDomain:        "ai-chat-room-c3352.firebaseapp.com",
  databaseURL:       "https://ai-chat-room-c3352-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "ai-chat-room-c3352",
  storageBucket:     "ai-chat-room-c3352.firebasestorage.app",
  messagingSenderId: "958010658776",
  appId:             "1:958010658776:web:5d7c15a5149055bf7e6cad"
};

// ──────────── Firebase 初始化 ────────────
import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, serverTimestamp, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

let db, roomId, myId, myName, myColorIdx;
let aiLock = false;

const USER_COLORS = ['--u0','--u1','--u2','--u3','--u4'];
const COLOR_HEX   = ['#c8410a','#2a6e4a','#1a4a8a','#7a3a8a','#8a5a1a'];

// ──────────── 設定狀態提示 ────────────
if (isConfigured) {
  document.getElementById('config-status').style.display = 'none';
} else {
  document.getElementById('config-status').textContent =
    '⚠ 尚未設定 Firebase。請閱讀下方教學，填入 firebaseConfig 後重新開啟此檔案。';
}

// ──────────── 工具 ────────────
function genId(len=6) {
  return Math.random().toString(36).slice(2, 2+len).toUpperCase();
}
function now() {
  return new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ──────────── Lobby ────────────
window.createRoom = function() {
  const name = document.getElementById('name-in').value.trim();
  if (!name) { toast('請輸入名稱'); return; }
  if (!isConfigured) { toast('請先填入 Firebase 設定'); return; }
  enter(name, genId(6));
};

window.joinRoom = function() {
  const name = document.getElementById('name-in').value.trim();
  const rid  = document.getElementById('room-in').value.trim().toUpperCase();
  if (!name) { toast('請輸入名稱'); return; }
  if (!rid)  { toast('請輸入房間代碼'); return; }
  if (!isConfigured) { toast('請先填入 Firebase 設定'); return; }
  enter(name, rid);
};

// ──────────── 進入房間 ────────────
async function enter(name, rid) {
  myName    = name;
  roomId    = rid;
  myId      = 'u_' + genId(8);

  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);

  // 分配顏色（取已用顏色後，選第一個未用的）
  const usersSnap = await get(ref(db, `rooms/${roomId}/users`));
  const taken = usersSnap.exists()
    ? Object.values(usersSnap.val()).map(u => u.colorIdx)
    : [];
  myColorIdx = [0,1,2,3,4].find(i => !taken.includes(i)) ?? (taken.length % 5);

  // 寫入自己
  await set(ref(db, `rooms/${roomId}/users/${myId}`), {
    name: myName, colorIdx: myColorIdx, ts: serverTimestamp()
  });

  // 加入系統訊息
  await push(ref(db, `rooms/${roomId}/messages`), {
    type: 'system', text: `${myName} 加入了對話室`, ts: serverTimestamp()
  });

  // 離開時清除自己
  window.addEventListener('beforeunload', async () => {
    await set(ref(db, `rooms/${roomId}/users/${myId}`), null);
    await push(ref(db, `rooms/${roomId}/messages`), {
      type: 'system', text: `${myName} 離開了對話室`, ts: serverTimestamp()
    });
  });

  // 切換介面
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';

  // 更新 header 資訊
  document.getElementById('room-badge').textContent = roomId;
  document.getElementById('mobile-room-code').textContent = roomId;
  const url = location.href.split('?')[0] + '?r=' + roomId;
  document.getElementById('share-url').textContent = url;

  // 監聽訊息
  onValue(ref(db, `rooms/${roomId}/messages`), snap => {
    if (!snap.exists()) return;
    renderMessages(snap.val());
  });

  // 監聽用戶
  onValue(ref(db, `rooms/${roomId}/users`), snap => {
    renderUsers(snap.exists() ? snap.val() : {});
  });

  document.getElementById('txt').focus();
}

// ──────────── 渲染訊息 ────────────
let lastKey = null;

function renderMessages(data) {
  const wrap = document.getElementById('msgs');
  wrap.innerHTML = '';
  lastKey = null;
  Object.entries(data).forEach(([k, m]) => {
    if (m.type === 'system') {
      appendSys(m.text);
    } else {
      appendMsg(m);
    }
    lastKey = k;
  });
  wrap.scrollTop = wrap.scrollHeight;
}

function appendSys(text) {
  const el = document.createElement('div');
  el.className = 'sys';
  el.textContent = text;
  document.getElementById('msgs').appendChild(el);
}

function appendMsg(m) {
  const wrap   = document.getElementById('msgs');
  const isMe   = m.userId === myId;
  const isAi   = m.userId === 'ai';
  const color  = isAi ? '#1a1a1a' : COLOR_HEX[m.colorIdx ?? 0];
  const initials = isAi ? 'AI' : (m.userName?.[0] ?? '?');

  const g = document.createElement('div');
  g.className = 'msg-group' + (isMe ? ' mine' : '') + (isAi ? ' ai-group' : '');

  g.innerHTML = `
    <div class="msg-meta">
      <div class="meta-avatar" style="background:${color}">${initials}</div>
      <span class="meta-name">${isAi ? 'Claude AI' : esc(m.userName)}</span>
    </div>
    <div class="bubble">${esc(m.text)}</div>
    <span class="bubble-time">${m.time || ''}</span>
  `;
  wrap.appendChild(g);
  wrap.scrollTop = wrap.scrollHeight;
}

// ──────────── 渲染用戶 ────────────
function renderUsers(usersData) {
  const row = document.getElementById('users-row');
  const sb  = document.getElementById('sb-users');
  row.innerHTML = '';
  sb.innerHTML  = '';

  Object.entries(usersData).forEach(([id, u]) => {
    const isMe = id === myId;
    const color = COLOR_HEX[u.colorIdx ?? 0];
    const initial = u.name?.[0] ?? '?';

    // header chips
    const chip = document.createElement('div');
    chip.className = 'user-tag';
    chip.innerHTML = `
      <div class="u-dot" style="background:${color}">${initial}</div>
      <span>${esc(u.name)}${isMe ? ' (我)' : ''}</span>
    `;
    row.appendChild(chip);

    // sidebar
    const su = document.createElement('div');
    su.className = 'sidebar-user';
    su.innerHTML = `
      <div class="online-ring"></div>
      <div class="meta-avatar" style="background:${color};width:20px;height:20px;font-size:9px">${initial}</div>
      <span>${esc(u.name)}${isMe ? ' (我)' : ''}</span>
    `;
    sb.appendChild(su);
  });
}

// ──────────── 發送訊息 ────────────
window.send = async function() {
  const ta   = document.getElementById('txt');
  const text = ta.value.trim();
  if (!text || aiLock) return;

  ta.value = '';
  resize(ta);

  // 寫入用戶訊息
  await push(ref(db, `rooms/${roomId}/messages`), {
    type: 'chat', userId: myId, userName: myName,
    colorIdx: myColorIdx, text, time: now(), ts: serverTimestamp()
  });

  await callAI();
};

window.onKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.send(); }
};

window.resize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ──────────── Claude API ────────────
async function callAI() {
  aiLock = true;
  document.getElementById('send-btn').disabled = true;

  // typing indicator
  const wrap = document.getElementById('msgs');
  const ind  = document.createElement('div');
  ind.className = 'msg-group ai-group';
  ind.id = 'typing';
  ind.innerHTML = `
    <div class="msg-meta">
      <div class="meta-avatar" style="background:#1a1a1a">AI</div>
      <span class="meta-name">Claude AI</span>
    </div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>
  `;
  wrap.appendChild(ind);
  wrap.scrollTop = wrap.scrollHeight;

  try {
    // 抓最近 30 則訊息構建 history
    const snap = await get(ref(db, `rooms/${roomId}/messages`));
    const allMsgs = snap.exists() ? Object.values(snap.val()) : [];
    const chatMsgs = allMsgs.filter(m => m.type === 'chat');

    // 合併相鄰同角色訊息
    const apiMsgs = [];
    for (const m of chatMsgs) {
      const role = m.userId === 'ai' ? 'assistant' : 'user';
      const content = m.userId === 'ai' ? m.text : `[${m.userName}]: ${m.text}`;
      if (apiMsgs.length && apiMsgs[apiMsgs.length-1].role === role) {
        apiMsgs[apiMsgs.length-1].content += '\n' + content;
      } else {
        apiMsgs.push({ role, content });
      }
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `你是一個親切的 AI 助手，正在參與一個多人共享對話室。
訊息格式為 [名稱]: 內容，對話中可能有多位使用者。
請用繁體中文自然回應，在適當時可以指名回覆特定使用者。
回應請簡潔有力，不要過於冗長。`,
        messages: apiMsgs
      })
    });

    const data = await res.json();
    const aiText = data.content?.[0]?.text ?? '抱歉，無法取得回應。';

    document.getElementById('typing')?.remove();

    await push(ref(db, `rooms/${roomId}/messages`), {
      type: 'chat', userId: 'ai', userName: 'Claude',
      text: aiText, time: now(), ts: serverTimestamp()
    });

  } catch(err) {
    document.getElementById('typing')?.remove();
    await push(ref(db, `rooms/${roomId}/messages`), {
      type: 'chat', userId: 'ai', userName: 'Claude',
      text: '（連線錯誤，請稍後再試）', time: now(), ts: serverTimestamp()
    });
  }

  aiLock = false;
  document.getElementById('send-btn').disabled = false;
}

// ──────────── 複製 ────────────
window.copyRoomId = function() {
  navigator.clipboard.writeText(roomId).then(() => toast('房間代碼已複製 ✓'));
};
window.copyLink = function() {
  const url = location.href.split('?')[0] + '?r=' + roomId;
  navigator.clipboard.writeText(url).then(() => toast('邀請連結已複製 ✓'));
};

// ──────────── URL 自動帶入房間代碼 ────────────
window.addEventListener('load', () => {
  const p = new URLSearchParams(location.search);
  const r = p.get('r');
  if (r) {
    document.getElementById('room-in').value = r.toUpperCase();
    document.getElementById('name-in').focus();
  }
});

</script>
